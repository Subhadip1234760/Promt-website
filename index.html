<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Sudip Edit 🔥</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#050505;
color:white;
min-height:100vh;
padding:20px;
overflow-x:hidden;
position:relative;
}

/* Animated Fire Background */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 50% 100%, rgba(255,80,0,.35), transparent 40%),
radial-gradient(circle at 20% 100%, rgba(255,0,0,.2), transparent 35%),
radial-gradient(circle at 80% 100%, rgba(255,150,0,.2), transparent 35%);
animation:fireMove 6s infinite alternate ease-in-out;
pointer-events:none;
z-index:-1;
}

@keyframes fireMove{
0%{transform:translateY(0);}
100%{transform:translateY(-20px);}
}

.logo-box{
text-align:center;
margin-bottom:25px;
}

.banner-img{
width:100%;
max-width:950px;
aspect-ratio:16/9;
object-fit:cover;
border-radius:25px;
display:block;
margin:auto;
border:2px solid #ff6600;
box-shadow:
0 0 20px #ff3300,
0 0 50px #ff6600;
animation:bannerGlow 3s infinite alternate;
}

@keyframes bannerGlow{
from{
box-shadow:
0 0 20px #ff3300,
0 0 50px #ff6600;
}
to{
box-shadow:
0 0 30px #ff8800,
0 0 80px #ff2200;
}
}

.header{
font-size:48px;
font-weight:900;
margin-top:20px;
cursor:pointer;
animation:fireText 2s infinite alternate;
text-shadow:
0 0 10px #ff6600,
0 0 20px #ff3300,
0 0 40px #ff0000;
}

@keyframes fireText{
0%{
transform:scale(1);
}
100%{
transform:scale(1.04);
}
}

.panel{
display:none;
max-width:700px;
margin:20px auto;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,120,0,.3);
}

input,textarea{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin:10px 0;
background:rgba(255,255,255,.1);
color:white;
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
cursor:pointer;
font-weight:bold;
color:white;
background:linear-gradient(45deg,#ff2200,#ff6600,#ffcc00);
background-size:300% 300%;
animation:btnAnim 4s linear infinite;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
}

@keyframes btnAnim{
0%{background-position:0%}
100%{background-position:300%}
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
margin-top:25px;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
border-radius:20px;
padding:15px;
overflow:hidden;
border:1px solid rgba(255,120,0,.2);
transition:.4s;
animation:showCard .7s ease;
}

.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:
0 0 25px #ff3300,
0 0 50px rgba(255,80,0,.5);
}

@keyframes showCard{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card img{
width:100%;
border-radius:15px;
transition:.5s;
}

.card:hover img{
transform:scale(1.05);
}

.prompt{
margin-top:12px;
padding:12px;
border-radius:12px;
background:rgba(0,0,0,.35);
line-height:1.6;
}

.footer{
text-align:center;
margin-top:30px;
opacity:.9;
font-size:15px;
}
</style>
</head>

<body>

<div class="logo-box">

<img
class="banner-img"
src="https://i.postimg.cc/Y9BLQ70D/IMG-20260603-WA0095.jpg"
alt="Banner">

<div class="header" id="logo">
🔥 Sudip Edit 🔥
</div>

</div>

<div class="panel" id="loginPanel">
<h2>🔐 Admin Login</h2>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="panel" id="adminPanel">
<h2>👑 Admin Panel</h2>

<input type="text" id="imageUrl" placeholder="Image URL">

<textarea id="promptText" rows="5"
placeholder="Prompt"></textarea>

<button onclick="addPost()">➕ Add Post</button>
<button onclick="logout()">🚪 Logout</button>
</div>

<div class="gallery" id="gallery"></div>

<div class="footer">
🔥 Powered By Sudip Edit 🔥
</div>

<script>

const ADMIN_PASSWORD="Sudip@2026";

let tap=0;

document.getElementById("logo").onclick=()=>{
tap++;
if(tap>=5){
document.getElementById("loginPanel").style.display="block";
tap=0;
}
};

let posts=JSON.parse(localStorage.getItem("posts"))||[
{
image:"https://i.postimg.cc/cHTtZrRR/IMG-20260605-WA0059.jpg",
prompt:"Beautiful Bengali woman in blue and pink saree..."
},
{
image:"https://i.postimg.cc/RFGJ9N1z/IMG-20260605-WA0061.jpg",
prompt:"Beautiful Bengali girl in red floral saree..."
}
];

function save(){
localStorage.setItem(
"posts",
JSON.stringify(posts)
);
}

function login(){

if(
document.getElementById("pass").value
===ADMIN_PASSWORD
){

sessionStorage.setItem(
"admin",
"yes"
);

document.getElementById(
"adminPanel"
).style.display="block";

document.getElementById(
"loginPanel"
).style.display="none";

render();

}else{

alert("Wrong Password");

}
}

function logout(){

sessionStorage.removeItem(
"admin"
);

document.getElementById(
"adminPanel"
).style.display="none";

render();

}

function addPost(){

const image=imageUrl.value.trim();
const prompt=promptText.value.trim();

if(!image||!prompt){

alert("Fill all fields");
return;

}

posts.unshift({
image,
prompt
});

save();
render();

imageUrl.value="";
promptText.value="";

}

function del(i){

if(confirm("Delete this post?")){

posts.splice(i,1);
save();
render();

}

}

function copyText(text){

navigator.clipboard.writeText(text);
alert("Prompt Copied");

}

function render(){

const admin=
sessionStorage.getItem("admin")
==="yes";

gallery.innerHTML="";

posts.forEach((p,i)=>{

gallery.innerHTML+=`

<div class="card">

<img src="${p.image}">

<div class="prompt">
${p.prompt}
</div>

<button onclick='copyText(${JSON.stringify(JSON.stringify(p.prompt))})'>
📋 Copy Prompt
</button>

${admin?`
<button onclick="del(${i})">
🗑 Delete Post
</button>
`:""}

</div>

`;

});

}

render();

</script>

</body>
</html>
